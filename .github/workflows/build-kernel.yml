name: Build Hardened Kernel

on:
  push:
    branches: [main]
    paths:
      - 'packages/lorica-kernel-cloud/**'
      - 'KERNEL_VERSION'
      - '.github/workflows/build-kernel.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/lorica-kernel-cloud/**'
      - 'KERNEL_VERSION'
      - '.github/workflows/build-kernel.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            config: config-amd64
            boot_test: true
          - arch: arm64
            runner: ubuntu-24.04-arm
            config: config-arm64
            boot_test: false
    runs-on: ${{ matrix.runner }}
    # Kernel builds with GCC plugins take 30-40 minutes per arch.
    # 120 minutes allows headroom for first build without ccache.
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read kernel version
        id: kver
        run: |
          KVER=$(tr -d '[:space:]' < KERNEL_VERSION)
          echo "version=$KVER" >> "$GITHUB_OUTPUT"
          echo "Kernel version: $KVER"

      - name: Install build dependencies
        run: |
          GCC_VER=$(gcc -dumpversion | cut -d. -f1)
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bc \
            kmod \
            cpio \
            flex \
            bison \
            libssl-dev \
            libelf-dev \
            dwarves \
            python3 \
            "gcc-${GCC_VER}-plugin-dev" \
            debhelper \
            ccache \
            wget \
            gnupg

      - name: Install QEMU and virtme-ng
        if: matrix.boot_test
        run: |
          sudo apt-get install -y --no-install-recommends qemu-system-x86
          sudo pip3 install --break-system-packages virtme-ng

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ matrix.arch }}-${{ steps.kver.outputs.version }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.arch }}-${{ steps.kver.outputs.version }}-
            ccache-${{ matrix.arch }}-

      - name: Configure ccache
        run: |
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          ccache --max-size=2G
          ccache --zero-stats

      - name: Download kernel tarball
        env:
          KVER: ${{ steps.kver.outputs.version }}
        run: |
          MAJOR=$(echo "$KVER" | cut -d. -f1)
          wget -q --tries=3 --waitretry=10 \
            "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${KVER}.tar.xz"
          wget -q --tries=3 --waitretry=10 \
            "https://cdn.kernel.org/pub/linux/kernel/v${MAJOR}.x/linux-${KVER}.tar.sign"

      - name: Verify GPG signature
        env:
          KVER: ${{ steps.kver.outputs.version }}
        run: |
          # Import Greg KH's and Linus's keys (try two keyservers)
          gpg --keyserver hkps://keyserver.ubuntu.com --recv-keys \
            647F28654894E3BD457199BE38DBBDC86092693E \
            ABAF11C65A2970B130ABE3C479BE3E4300411886 \
            || gpg --keyserver hkps://keys.openpgp.org --recv-keys \
              647F28654894E3BD457199BE38DBBDC86092693E \
              ABAF11C65A2970B130ABE3C479BE3E4300411886

          # Decompress for signature verification (.tar.sign signs the .tar, not .tar.xz)
          xz -dk "linux-${KVER}.tar.xz"

          # Verify signature -- MUST succeed for a security project
          gpg --verify "linux-${KVER}.tar.sign" "linux-${KVER}.tar"
          echo "GPG signature verified successfully"

          # Clean up uncompressed tar to save disk
          rm -f "linux-${KVER}.tar"

      - name: Extract kernel source
        env:
          KVER: ${{ steps.kver.outputs.version }}
        run: |
          tar xf "linux-${KVER}.tar.xz"
          echo "KERNEL_SRC=${{ github.workspace }}/linux-${KVER}" >> "$GITHUB_ENV"

      - name: Copy kernel config
        run: |
          cp "packages/lorica-kernel-cloud/${{ matrix.config }}" "$KERNEL_SRC/.config"

      - name: Resolve config and detect drift
        working-directory: ${{ env.KERNEL_SRC }}
        run: |
          # Save our config for comparison
          cp .config .config.lorica
          # olddefconfig resolves any new options to their defaults without prompting.
          # This is required because our config was generated from Debian's build,
          # and kernel.org source may have slightly different option dependencies.
          make olddefconfig
          if ! diff -u .config.lorica .config > /tmp/config-drift.diff 2>&1; then
            echo "::warning::Config drift detected -- olddefconfig resolved new/changed options."
            echo "Review the diff below. If any new option needs a non-default value, update apply-hardening.sh."
            echo "::group::Config drift diff"
            cat /tmp/config-drift.diff
            echo "::endgroup::"
          else
            echo "No config drift detected"
          fi
          # Build with the resolved config (NOT the original -- it may have unresolved options)

      - name: Build kernel packages
        working-directory: ${{ env.KERNEL_SRC }}
        env:
          KVER: ${{ steps.kver.outputs.version }}
        run: |
          set -o pipefail
          make bindeb-pkg \
            LOCALVERSION=-lorica \
            KDEB_PKGVERSION="${KVER}-lorica-1" \
            -j"$(nproc)" \
            2>&1 | tee /tmp/kernel-build.log | tail -200

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Collect and validate .deb artifacts
        run: |
          mkdir -p "kernel-debs-${{ matrix.arch }}"
          # bindeb-pkg places .debs in the parent of the kernel source directory
          cp "$KERNEL_SRC"/../linux-image-*.deb "kernel-debs-${{ matrix.arch }}/"
          cp "$KERNEL_SRC"/../linux-headers-*.deb "kernel-debs-${{ matrix.arch }}/" || true
          echo "Collected artifacts:"
          ls -lh "kernel-debs-${{ matrix.arch }}/"
          # Validate linux-image .deb exists (mandatory artifact)
          test -n "$(ls kernel-debs-${{ matrix.arch }}/linux-image-*.deb 2>/dev/null)" \
            || { echo "::error::No linux-image .deb found"; exit 1; }

      - name: QEMU boot test (virtme-ng)
        if: matrix.boot_test
        working-directory: ${{ env.KERNEL_SRC }}
        continue-on-error: true
        run: |
          # vng with no --run/--build boots the kernel from the current directory.
          # -e runs the command in the guest and exits.
          BOOT_OUTPUT=$(timeout 120 vng -e \
            "uname -r && cat /proc/cmdline && echo LORICA_BOOT_OK" 2>&1) \
            || true

          echo "$BOOT_OUTPUT"

          if echo "$BOOT_OUTPUT" | grep -q "LORICA_BOOT_OK"; then
            echo "Boot test PASSED"
          else
            echo "::warning::Boot test did not produce LORICA_BOOT_OK -- check log above"
            exit 1
          fi

      - name: Upload kernel .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-debs-${{ matrix.arch }}
          path: kernel-debs-${{ matrix.arch }}/*.deb
          retention-days: 30

  publish:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install APT repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gpg

      - name: Download amd64 kernel debs
        uses: actions/download-artifact@v4
        with:
          name: kernel-debs-amd64
          path: kernel-debs/

      - name: Download arm64 kernel debs
        uses: actions/download-artifact@v4
        with:
          name: kernel-debs-arm64
          path: kernel-debs/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Update APT repository with kernel debs
        run: |
          cd repo

          # Create directory structure (preserves existing pool contents)
          mkdir -p pool/main
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64

          # Remove old kernel debs only (preserves config package debs)
          rm -f pool/main/linux-image-*lorica*.deb
          rm -f pool/main/linux-headers-*lorica*.deb

          # Copy new kernel debs (skip debug debs -- too large for GitHub Pages)
          for deb in ../kernel-debs/linux-image-*lorica*.deb; do
            case "$deb" in *-dbg_*) continue ;; esac
            cp "$deb" pool/main/
          done
          cp ../kernel-debs/linux-headers-*lorica*.deb pool/main/ || true

          echo "Pool contents:"
          ls -lh pool/main/

          # Export public key
          gpg --armor --export "Lorica Linux Package Signing" > lorica-keyring.asc

          # Generate Packages index from full pool (config + kernel debs)
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          cp dists/stable/main/binary-amd64/Packages dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Lorica Linux" \
            -o APT::FTPArchive::Release::Label="Lorica Linux" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            release dists/stable > dists/stable/Release

          # Sign Release
          gpg --default-key "Lorica Linux Package Signing" \
            --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --default-key "Lorica Linux Package Signing" \
            -abs -o dists/stable/Release.gpg dists/stable/Release

      - name: Deploy to gh-pages
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repository (kernel debs)" || echo "No changes to commit"
          git push
