name: Build and Test Packages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            devscripts \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build lorica-keyring
        working-directory: packages/lorica-keyring
        run: dpkg-buildpackage -us -uc -b

      - name: Build lorica-base
        working-directory: packages/lorica-base
        run: dpkg-buildpackage -us -uc -b

      - name: Build lorica-cloud-server
        working-directory: packages/lorica-cloud-server
        run: dpkg-buildpackage -us -uc -b

      - name: Install packages
        run: |
          apt-get install -y --no-install-recommends \
            ./packages/lorica-keyring_*.deb \
            ./packages/lorica-base_*.deb \
            ./packages/lorica-cloud-server_*.deb

      - name: Verify config files are installed
        run: |
          test -f /usr/lib/sysctl.d/90-lorica-hardening.conf
          test -f /etc/default/grub.d/50-lorica-hardening.cfg
          test -f /etc/modprobe.d/30-lorica-blacklist.conf
          test -f /etc/audit/rules.d/lorica-compliance.rules
          echo "All config files present."
          # Content validation -- configs are not empty stubs
          grep -q "kernel.kptr_restrict=2" /usr/lib/sysctl.d/90-lorica-hardening.conf
          grep -q "net.ipv4.tcp_syncookies=1" /usr/lib/sysctl.d/90-lorica-hardening.conf
          grep -q "oops=panic" /etc/default/grub.d/50-lorica-hardening.cfg
          grep -q "lockdown=integrity" /etc/default/grub.d/50-lorica-hardening.cfg
          grep -q "install bluetooth /bin/false" /etc/modprobe.d/30-lorica-blacklist.conf
          grep -q "install dccp /bin/false" /etc/modprobe.d/30-lorica-blacklist.conf
          test $(grep -c '/bin/false' /etc/modprobe.d/30-lorica-blacklist.conf) -ge 38
          grep -q "\-e 2" /etc/audit/rules.d/lorica-compliance.rules
          grep -q "arch=b32" /etc/audit/rules.d/lorica-compliance.rules
          grep -q "tmp_exec" /etc/audit/rules.d/lorica-compliance.rules
          test -f /etc/sysctl.d/91-lorica-io-uring.conf
          test -f /usr/share/doc/lorica-base/cloud-overrides.conf.example

      - name: Uninstall packages
        run: |
          apt-get remove -y lorica-cloud-server lorica-base lorica-keyring

      - name: Verify clean uninstall
        run: |
          ! test -f /usr/lib/sysctl.d/90-lorica-hardening.conf
          ! test -f /etc/default/grub.d/50-lorica-hardening.cfg
          ! test -f /etc/modprobe.d/30-lorica-blacklist.conf
          ! test -f /etc/audit/rules.d/lorica-compliance.rules
          test ! -f /etc/sysctl.d/91-lorica-io-uring.conf
          echo "Clean uninstall verified."

      - name: Upload .deb artifacts
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: lorica-debs
          path: packages/*.deb
          retention-days: 30
