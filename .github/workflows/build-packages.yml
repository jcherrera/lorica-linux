name: Build and Test Packages

on:
  push:
    branches: [main]
    paths:
      - 'packages/lorica-keyring/**'
      - 'packages/lorica-base/**'
      - 'packages/lorica-hardened-profile/**'
      - 'packages/lorica-cloud-server/**'
      - '.github/workflows/build-packages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/lorica-keyring/**'
      - 'packages/lorica-base/**'
      - 'packages/lorica-hardened-profile/**'
      - 'packages/lorica-cloud-server/**'
      - '.github/workflows/build-packages.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            debhelper \
            devscripts \
            git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build lorica-keyring
        working-directory: packages/lorica-keyring
        run: dpkg-buildpackage -us -uc -b

      - name: Build lorica-base
        working-directory: packages/lorica-base
        run: dpkg-buildpackage -us -uc -b

      - name: Build lorica-hardened-profile
        working-directory: packages/lorica-hardened-profile
        run: dpkg-buildpackage -us -uc -b

      - name: Build lorica-cloud-server
        working-directory: packages/lorica-cloud-server
        run: dpkg-buildpackage -us -uc -b

      - name: Install packages
        run: |
          apt-get install -y --no-install-recommends \
            ./packages/lorica-keyring_*.deb \
            ./packages/lorica-base_*.deb \
            ./packages/lorica-cloud-server_*.deb

      - name: Verify config files are installed
        run: |
          test -f /usr/lib/sysctl.d/90-lorica-hardening.conf
          test -f /etc/default/grub.d/50-lorica-hardening.cfg
          test -f /etc/modprobe.d/30-lorica-blacklist.conf
          test -f /etc/audit/rules.d/lorica-compliance.rules
          test -f /etc/default/grub.d/40-lorica-theme.cfg
          test -f /boot/grub/themes/lorica/theme.txt
          test -f /etc/update-motd.d/10-lorica
          test -x /etc/update-motd.d/10-lorica
          echo "All config files present."
          # Content validation -- configs are not empty stubs
          grep -q "kernel.kptr_restrict=2" /usr/lib/sysctl.d/90-lorica-hardening.conf
          grep -q "net.ipv4.tcp_syncookies=1" /usr/lib/sysctl.d/90-lorica-hardening.conf
          grep -q "oops=panic" /etc/default/grub.d/50-lorica-hardening.cfg
          grep -q "lockdown=integrity" /etc/default/grub.d/50-lorica-hardening.cfg
          grep -q "install bluetooth /bin/false" /etc/modprobe.d/30-lorica-blacklist.conf
          grep -q "install dccp /bin/false" /etc/modprobe.d/30-lorica-blacklist.conf
          test $(grep -c '/bin/false' /etc/modprobe.d/30-lorica-blacklist.conf) -ge 38
          grep -q "\-e 2" /etc/audit/rules.d/lorica-compliance.rules
          grep -q "arch=b32" /etc/audit/rules.d/lorica-compliance.rules
          grep -q "tmp_exec" /etc/audit/rules.d/lorica-compliance.rules
          test -f /etc/sysctl.d/91-lorica-io-uring.conf
          test -f /usr/share/doc/lorica-base/cloud-overrides.conf.example
          # Verify hardened-only settings are NOT in base configs
          ! grep -q "panic_on_warn" /usr/lib/sysctl.d/90-lorica-hardening.conf
          ! grep -q "nosmt" /etc/default/grub.d/50-lorica-hardening.cfg

      - name: Install lorica-hardened-profile
        run: |
          apt-get install -y --no-install-recommends \
            ./packages/lorica-hardened-profile_*.deb

      - name: Verify hardened profile configs
        run: |
          test -f /etc/sysctl.d/92-lorica-hardened.conf
          test -f /etc/default/grub.d/51-lorica-hardened.cfg
          # Content validation
          grep -q "kernel.panic_on_warn=1" /etc/sysctl.d/92-lorica-hardened.conf
          grep -q "kernel.yama.ptrace_scope=3" /etc/sysctl.d/92-lorica-hardened.conf
          grep -q "icmp_echo_ignore_all=1" /etc/sysctl.d/92-lorica-hardened.conf
          grep -q "nosmt" /etc/default/grub.d/51-lorica-hardened.cfg
          grep -q "lockdown=confidentiality" /etc/default/grub.d/51-lorica-hardened.cfg

      - name: Uninstall hardened profile
        run: |
          apt-get purge -y lorica-hardened-profile

      - name: Verify hardened profile uninstall
        run: |
          ! test -f /etc/sysctl.d/92-lorica-hardened.conf
          ! test -f /etc/default/grub.d/51-lorica-hardened.cfg

      - name: Uninstall packages
        run: |
          apt-get purge -y lorica-cloud-server lorica-base lorica-keyring

      - name: Verify clean uninstall
        run: |
          ! test -f /usr/lib/sysctl.d/90-lorica-hardening.conf
          ! test -f /etc/default/grub.d/50-lorica-hardening.cfg
          ! test -f /etc/modprobe.d/30-lorica-blacklist.conf
          ! test -f /etc/audit/rules.d/lorica-compliance.rules
          test ! -f /etc/sysctl.d/91-lorica-io-uring.conf
          echo "Clean uninstall verified."

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lorica-debs
          path: packages/*.deb
          retention-days: 30

  compatibility-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm

    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: lorica-debs
          path: debs/

      - name: Install Lorica packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ./debs/lorica-keyring_*.deb \
            ./debs/lorica-base_*.deb \
            ./debs/lorica-cloud-server_*.deb

      - name: Lynis audit score
        run: |
          apt-get install -y --no-install-recommends lynis procps
          # Run lynis (non-interactive, no color)
          lynis audit system --no-colors --quick 2>&1 | tee /tmp/lynis-output.txt || true
          # Extract and display the hardening index
          echo "=== LYNIS HARDENING INDEX ==="
          grep -E "Hardening index" /tmp/lynis-output.txt || echo "Could not extract hardening index"
          echo "=== END LYNIS ==="

      - name: Test nginx compatibility
        run: |
          apt-get install -y --no-install-recommends nginx curl
          nginx
          sleep 1
          curl -sf http://localhost/ > /dev/null
          echo "nginx: OK -- serves pages with Lorica installed"
          nginx -s stop

      - name: Test PostgreSQL compatibility
        run: |
          apt-get install -y --no-install-recommends postgresql postgresql-client
          pg_ctlcluster 15 main start
          su - postgres -c "psql -c 'CREATE DATABASE lorica_test;'"
          su - postgres -c "psql -d lorica_test -c 'CREATE TABLE test (id int); INSERT INTO test VALUES (1); SELECT * FROM test;'"
          echo "PostgreSQL: OK -- start, create DB, query all work with Lorica installed"
          pg_ctlcluster 15 main stop

      - name: Test Node.js compatibility
        run: |
          apt-get install -y --no-install-recommends nodejs curl
          # Start a simple HTTP server in the background
          node -e "require('http').createServer((req,res)=>{res.end('ok')}).listen(3000)" &
          NODE_PID=$!
          sleep 1
          RESULT=$(curl -sf http://localhost:3000/)
          kill $NODE_PID
          test "$RESULT" = "ok"
          echo "Node.js: OK -- HTTP server works with Lorica installed"

      - name: Test apt upgrade does not overwrite configs
        run: |
          # Snapshot config checksums before upgrade
          md5sum /usr/lib/sysctl.d/90-lorica-hardening.conf > /tmp/before.md5
          md5sum /etc/default/grub.d/50-lorica-hardening.cfg >> /tmp/before.md5
          md5sum /etc/modprobe.d/30-lorica-blacklist.conf >> /tmp/before.md5
          md5sum /etc/audit/rules.d/lorica-compliance.rules >> /tmp/before.md5

          # Run a full upgrade
          apt-get upgrade -y

          # Verify configs unchanged
          md5sum --check /tmp/before.md5
          echo "apt upgrade: OK -- Lorica configs survived upgrade unchanged"

  publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Install APT repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev apt-utils gpg

      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: lorica-debs
          path: debs/

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: repo

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Generate APT repository
        run: |
          cd repo

          # Create directory structure (preserves existing pool contents)
          mkdir -p pool/main
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64

          # Remove old config package debs only (preserves kernel debs if present)
          rm -f pool/main/lorica-*.deb

          # Copy new config debs to pool
          cp ../debs/*.deb pool/main/

          # Export public key for user install step
          gpg --armor --export "Lorica Linux Package Signing" > lorica-keyring.asc

          # Generate Packages index from full pool (includes kernel debs if present)
          dpkg-scanpackages pool/main /dev/null > dists/stable/main/binary-amd64/Packages
          cp dists/stable/main/binary-amd64/Packages dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="Lorica Linux" \
            -o APT::FTPArchive::Release::Label="Lorica Linux" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
            -o APT::FTPArchive::Release::Components="main" \
            release dists/stable > dists/stable/Release

          # Sign Release (InRelease = inline signature, Release.gpg = detached)
          rm -f dists/stable/InRelease dists/stable/Release.gpg
          gpg --batch --yes --default-key "Lorica Linux Package Signing" \
            --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --default-key "Lorica Linux Package Signing" \
            -abs -o dists/stable/Release.gpg dists/stable/Release

      - name: Deploy to gh-pages
        run: |
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repository" || echo "No changes to commit"
          git push
