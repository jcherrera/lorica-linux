# Lorica Linux -- GRUB Boot Parameter Hardening (lorica-base)
# /etc/default/grub.d/50-lorica-hardening.cfg
#
# Source of truth: docs/hardening-decisions.md (Section 2)
# Profile: BASE
#
# After modifying, run: sudo update-grub
# Adapted from: Kicksecure security-misc, KSPP, CIS Debian 12 Benchmark

GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX \
  mitigations=auto \
  oops=panic panic=10 \
  init_on_alloc=1 init_on_free=1 \
  slab_nomerge \
  page_alloc.shuffle=1 \
  pti=on \
  vsyscall=none \
  debugfs=off \
  lockdown=integrity \
  randomize_kstack_offset=on \
  quiet loglevel=0"
