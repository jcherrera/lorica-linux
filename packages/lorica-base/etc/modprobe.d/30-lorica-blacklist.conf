# Lorica Linux -- Kernel Module Blacklist for Servers (lorica-base)
# /etc/modprobe.d/30-lorica-blacklist.conf
#
# Source of truth: docs/hardening-decisions.md (Section 3)
# Profile: BASE
#
# Disables kernel modules irrelevant to headless cloud servers.
# Uses "install <module> /bin/false" to prevent loading even if hardware requests it.
#
# Adapted from: Kicksecure security-misc, CIS Debian 12 Benchmark

# --- 3.1 Bluetooth [Kicksecure, CIS] ---
install bluetooth /bin/false
install btusb /bin/false
install btrtl /bin/false
install btintel /bin/false
install btbcm /bin/false
install btmtk /bin/false

# --- 3.2 FireWire / IEEE 1394 -- DMA attack vector [Kicksecure, CIS] ---
install firewire_core /bin/false
install firewire_ohci /bin/false
install firewire_sbp2 /bin/false
install firewire_net /bin/false

# --- 3.3 Thunderbolt + DMA [Kicksecure] ---
install thunderbolt /bin/false
install apple_gmux /bin/false

# --- 3.4 Sound -- no server needs audio [Kicksecure] ---
install soundcore /bin/false
install snd /bin/false
install snd_pcm /bin/false

# --- 3.5 Legacy / Uncommon Filesystems [CIS 1.1.x, Kicksecure] ---
install cramfs /bin/false
install freevxfs /bin/false
install jffs2 /bin/false
install hfs /bin/false
install hfsplus /bin/false
install udf /bin/false

# --- 3.6 USB Storage [Kicksecure, CIS] ---
install usb_storage /bin/false
install uas /bin/false

# --- 3.7 Video / Webcam [Kicksecure] ---
install uvcvideo /bin/false

# --- 3.8 Intel Management Engine [Kicksecure] ---
install mei /bin/false
install mei_me /bin/false

# --- 3.9 Uncommon Network Protocols [CIS 3.2.x, Kicksecure] ---
install dccp /bin/false
install sctp /bin/false
install rds /bin/false
install tipc /bin/false
install appletalk /bin/false
install ipx /bin/false
install can /bin/false
install p8023 /bin/false
install n_hdlc /bin/false

# --- 3.10 Miscellaneous Hardware ---
install pcspkr /bin/false
install vivid /bin/false
install efi_pstore /bin/false
