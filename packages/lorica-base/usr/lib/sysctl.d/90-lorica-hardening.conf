# Lorica Linux -- Sysctl Hardening (lorica-base)
# /usr/lib/sysctl.d/90-lorica-hardening.conf
#
# Source of truth: docs/hardening-decisions.md
# Every setting is documented with source, rationale, and compliance mapping.
#
# Profile: BASE (shipped by default with lorica-base)
# For maximum hardening, install lorica-hardened-profile.
#
# Adapted from: Kicksecure security-misc, KSPP, CIS Debian 12 Benchmark

# =============================================================================
# 1.1 Kernel Information Leak Prevention
# Compliance: CIS 1.5.1, PCI-DSS 2.2, SOC 2 CC6.1
# =============================================================================

# Hide kernel pointers from all users including root [KSPP, Kicksecure, CIS]
kernel.kptr_restrict=2

# Restrict kernel log access to CAP_SYSLOG [KSPP, Kicksecure, CIS]
kernel.dmesg_restrict=1

# Disallow all unprivileged perf events [KSPP, Kicksecure]
# Debian-specific: value 3 not accepted upstream, supported on Debian kernels
kernel.perf_event_paranoid=3

# Suppress kernel messages to reduce information leakage [Kicksecure]
kernel.printk=3 3 3 3

# Full ASLR -- stack, VDSO, mmap, heap [KSPP, CIS 1.5.1]
# Default on modern kernels; set explicitly as defense-in-depth
kernel.randomize_va_space=2

# =============================================================================
# 1.2 Memory Protection
# Compliance: CIS 1.5.3, PCI-DSS 2.2, SOC 2 CC6.1
# =============================================================================

# Block low-address mmap -- prevents null pointer dereference exploits [KSPP, Kicksecure]
vm.mmap_min_addr=65536

# Disable core dumps for SUID/SGID processes [KSPP, CIS 1.5.3]
fs.suid_dumpable=0

# Discard all core dumps -- belt-and-suspenders with suid_dumpable=0 [Lorica]
# Core dumps can contain secrets (credentials, API keys, session tokens)
kernel.core_pattern=|/bin/false

# =============================================================================
# 1.3 Attack Surface Reduction
# Compliance: PCI-DSS 2.2, SOC 2 CC6.8
# =============================================================================

# Disable kexec -- prevent runtime kernel replacement [KSPP, Kicksecure]
# Irreversible until reboot. No legitimate use on production servers.
kernel.kexec_load_disabled=1

# Disable SysRq key [Kicksecure, CIS]
kernel.sysrq=0

# Restrict eBPF to CAP_BPF (root) [KSPP, Kicksecure]
kernel.unprivileged_bpf_disabled=1

# Harden BPF JIT against spray attacks [KSPP, Kicksecure]
net.core.bpf_jit_harden=2

# io_uring restriction is handled by postinst script because the sysctl name
# depends on kernel version. See /etc/sysctl.d/91-lorica-io-uring.conf

# Prevent TTY line discipline autoloading [KSPP]
# Requires kernel 5.1+. Prevents exploitation of vulnerable line disciplines.
dev.tty.ldisc_autoload=0

# Block unprivileged userfaultfd -- removes UAF exploit primitive [KSPP]
vm.unprivileged_userfaultfd=0

# =============================================================================
# 1.4 Process Isolation
# Compliance: CIS 1.5.2, PCI-DSS 2.2, SOC 2 CC6.1
# =============================================================================

# Restrict ptrace to CAP_SYS_PTRACE [KSPP, Kicksecure]
# sudo strace works; unprivileged strace does not
# Hardened profile escalates to 3 (no attach at all)
kernel.yama.ptrace_scope=2

# Auto-reboot 10s after kernel panic [Best practice]
# On cloud servers behind load balancers, fast reboot > hung instance
kernel.panic=10

# =============================================================================
# 1.6 Network Hardening -- IPv4
# Compliance: CIS 3.3.1-3.3.8, PCI-DSS 2.2, SOC 2 CC6.6
# =============================================================================

# SYN flood protection [CIS 3.3.8, Kicksecure]
net.ipv4.tcp_syncookies=1

# Strict reverse path filtering -- anti-spoofing [CIS 3.3.7, KSPP, Kicksecure]
net.ipv4.conf.all.rp_filter=1
net.ipv4.conf.default.rp_filter=1

# Ignore ICMP redirects -- MITM prevention [CIS 3.3.3, Kicksecure]
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0

# Ignore "secure" ICMP redirects [CIS 3.3.4, Kicksecure]
net.ipv4.conf.all.secure_redirects=0
net.ipv4.conf.default.secure_redirects=0

# Don't send ICMP redirects -- not a router [CIS 3.3.2, Kicksecure]
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0

# Disable source-routed packets [CIS 3.3.6, Kicksecure]
net.ipv4.conf.all.accept_source_route=0
net.ipv4.conf.default.accept_source_route=0

# Log packets with impossible source addresses [CIS 3.3.5, Kicksecure]
net.ipv4.conf.all.log_martians=1
net.ipv4.conf.default.log_martians=1

# Ignore broadcast ICMP -- Smurf attack prevention [CIS, Kicksecure]
net.ipv4.icmp_echo_ignore_broadcasts=1

# Ignore bogus ICMP error responses [CIS, Kicksecure]
net.ipv4.icmp_ignore_bogus_error_responses=1

# TIME-WAIT assassination protection (RFC 1337) [Kicksecure]
net.ipv4.tcp_rfc1337=1

# Disable IP forwarding -- not a router [CIS 3.3.1]
# Docker/K8s override to 1 at runtime; this provides the secure default
net.ipv4.ip_forward=0

# =============================================================================
# 1.7 Network Hardening -- ARP
# Compliance: PCI-DSS 2.2, SOC 2 CC6.6
# =============================================================================

# Allow gratuitous ARP -- required for AWS ENI failover, keepalived, floating IPs
# [ADAPT from Kicksecure=1] Hardened profile sets 1 for trusted networks
net.ipv4.conf.all.drop_gratuitous_arp=0

# ARP filtering -- respond only on correct interface [Kicksecure]
net.ipv4.conf.all.arp_filter=1

# =============================================================================
# 1.8 Network Hardening -- IPv6
# Compliance: CIS 3.3.9-3.3.11, PCI-DSS 2.2, SOC 2 CC6.6
# =============================================================================

# Ignore IPv6 ICMP redirects [CIS 3.3.9, Kicksecure]
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0

# Disable IPv6 source routing [CIS 3.3.10, Kicksecure]
net.ipv6.conf.all.accept_source_route=0
net.ipv6.conf.default.accept_source_route=0

# Disable IPv6 Router Advertisements [CIS 3.3.11, Kicksecure]
# EXCEPTION: AWS/GCP/Azure IPv6 VPCs require RA for address assignment.
# See /usr/share/doc/lorica-base/cloud-overrides.conf.example
net.ipv6.conf.all.accept_ra=0
net.ipv6.conf.default.accept_ra=0

# =============================================================================
# 1.9 ICMP & TCP Options
# =============================================================================

# Allow ICMP echo (ping) -- required for cloud health checks and monitoring
# [ADAPT from Kicksecure=1] Hardened profile sets 1
net.ipv4.icmp_echo_ignore_all=0

# Keep TCP timestamps enabled [ADAPT from Kicksecure=0]
# Modern kernels (5.x+) randomize offsets; disabling breaks PAWS and TCP performance
net.ipv4.tcp_timestamps=1

# =============================================================================
# 1.10 TCP Performance -- Cloud Server Optimization
# =============================================================================

# Fair Queue packet scheduler -- required for BBR [Best practice]
net.core.default_qdisc=fq

# BBR congestion control -- better throughput on high-latency/lossy links [Best practice]
net.ipv4.tcp_congestion_control=bbr

# =============================================================================
# 1.11 Filesystem Protection
# Compliance: CIS 1.5.x, PCI-DSS 2.2, SOC 2 CC6.1
# =============================================================================

# Prevent symlink-based TOCTOU attacks [KSPP, CIS, Kicksecure]
fs.protected_symlinks=1

# Prevent hardlink-based privilege escalation [KSPP, CIS, Kicksecure]
fs.protected_hardlinks=1

# Restrict FIFO creation in world-writable sticky dirs [KSPP, Kicksecure]
# Value 2: owner must match directory owner (strictest)
fs.protected_fifos=2

# Restrict file creation in world-writable sticky dirs [KSPP, Kicksecure]
fs.protected_regular=2
