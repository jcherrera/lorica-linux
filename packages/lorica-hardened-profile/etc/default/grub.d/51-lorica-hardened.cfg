# Lorica Linux -- Hardened Profile GRUB Overrides
# /etc/default/grub.d/51-lorica-hardened.cfg
#
# Source of truth: docs/hardening-decisions.md (Section 2.4)
# Profile: HARDENED (opt-in via apt install lorica-hardened-profile)
#
# These parameters supplement the BASE boot parameters (50-lorica-hardening.cfg).
# The kernel uses the last value for duplicate params, so lockdown=confidentiality
# overrides BASE's lockdown=integrity.
#
# WARNING: nosmt halves vCPU count (~20-30% throughput loss).
# After modifying, run: sudo update-grub && reboot

GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX \
  nosmt \
  slub_debug=FZ \
  lockdown=confidentiality"
