# Lorica Linux -- Hardened Profile Sysctl Overrides
# /etc/sysctl.d/92-lorica-hardened.conf
#
# Source of truth: docs/hardening-decisions.md
# Profile: HARDENED (opt-in via apt install lorica-hardened-profile)
#
# These settings override lorica-base defaults for maximum hardening.
# WARNING: May impact performance and break some debugging workflows.

# =============================================================================
# 1.5 Crash Behavior
# Compliance: KSPP full compliance
# =============================================================================

# Panic on kernel warnings (not just oops) [KSPP, Kicksecure]
# Aggressive but catches memory corruption early on financial workloads
kernel.panic_on_warn=1

# Panic after first kernel oops [KSPP]
kernel.oops_limit=1

# Panic after first kernel warning [KSPP]
kernel.warn_limit=1

# =============================================================================
# 1.4 Process Isolation Override
# =============================================================================

# No ptrace attach at all (overrides BASE ptrace_scope=2) [KSPP]
# WARNING: Breaks strace entirely, even with sudo
kernel.yama.ptrace_scope=3

# =============================================================================
# 1.7 ARP Hardening Override
# =============================================================================

# Drop gratuitous ARP (overrides BASE drop_gratuitous_arp=0) [Kicksecure]
# WARNING: Breaks AWS ENI failover, keepalived, floating IPs
net.ipv4.conf.all.drop_gratuitous_arp=1

# =============================================================================
# 1.9 ICMP Override
# =============================================================================

# Block all ICMP echo (overrides BASE icmp_echo_ignore_all=0) [Kicksecure]
# WARNING: Breaks cloud health checks and ping-based monitoring
net.ipv4.icmp_echo_ignore_all=1
